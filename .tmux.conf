# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.tmux.conf

# mouse mode
set -g mouse on

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# History size
set -g history-limit 10000

# Style: Dracula palette
# bg=#282a36 current-line=#44475a fg=#f8f8f2 comment=#6272a4
# cyan=#8be9fd green=#50fa7b orange=#ffb86c pink=#ff79c6
# purple=#bd93f9 red=#ff5555 yellow=#f1fa8c

# panes
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#f8f8f2 bg=#282a36'

set -g status-left ' #[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36,nobold] '
set -g status-left-length 40

set -g status-right '#[fg=#6272a4]#[fg=#f8f8f2,bg=#6272a4] %Y-%m-%d #[fg=#bd93f9,bg=#6272a4]#[fg=#282a36,bg=#bd93f9,bold] %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=#282a36 bg=#ff79c6 bold'
setw -g window-status-current-format ' #I #W#{?window_zoomed_flag, Z,} '

setw -g window-status-style 'fg=#6272a4 bg=#282a36'
setw -g window-status-format ' #I #[fg=#f8f8f2]#W#{?window_zoomed_flag,#[fg=#ffb86c] Z,} '

setw -g window-status-bell-style 'fg=#f1fa8c bg=#ff5555 bold'

# messages
set -g message-style 'fg=#f8f8f2 bg=#44475a bold'

